name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Docker Login
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build Image
    - name: Build Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/python-app:latest .

    # 4. Push Image
    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/python-app:latest

    # 5. Create KIND Cluster
    - name: Create Kind Cluster
      uses: helm/kind-action@v1

    # 6. Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    # 7. Deploy App
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml

    # 8. Wait for Pods to be Ready
    - name: Wait for Deployment
      run: |
        kubectl rollout status deployment/python-app --timeout=120s

    # 9. Test Application (IMPORTANT)
    - name: Test Application
      run: |
        kubectl port-forward service/python-service 5000:5000 &
        sleep 10

        RESPONSE=$(curl -s http://localhost:5000)

        echo "Response: $RESPONSE"

        if [[ "$RESPONSE" == *"Hello from Kubernetes"* ]]; then
          echo "Test Passed"
        else
          echo "Test Failed"
          exit 1
        fi

    # 10. Debug (runs only if failure)
    - name: Debug on Failure
      if: failure()
      run: |
        kubectl get pods
        kubectl describe pods
        kubectl logs deployment/python-app
